# ── File upload ────────────────────────────────────────────────────────────────
file.upload-dir=/uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# "update" auto-adds new columns (priority, caseId, createdAt) without dropping data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FIX: Register JavaTimeModule so Jackson can serialize LocalDateTime.
# Without this, GET /api/events returns 500 because Jackson doesn't know
# how to handle LocalDateTime out of the box.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.mvc.converters.preferred-json-mapper=jackson

