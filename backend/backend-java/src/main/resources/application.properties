# ── Database ───────────────────────────────────────────────────────────────────
# ── Production (Neon PostgreSQL) — swap these in before deploying ───────────────
spring.datasource.url=jdbc:postgresql://ep-sparkling-scene-atf45us9-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_JOptMGAUKI25

# ── File upload ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── HikariCP — resilience for Neon suspend/resume ──────────────────────────────
# Don't crash at startup if DB takes time to resume; retry until it responds
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000

spring.jackson.serialization.write-dates-as-timestamps=false
spring.mvc.converters.preferred-json-mapper=jackson

# ── JWT ────────────────────────────────────────────────────────────────────────
# Override in production by setting the JWT_SECRET environment variable in Render
jwt.secret=${JWT_SECRET:lexaequitas-secret-key-very-secure-12345}

